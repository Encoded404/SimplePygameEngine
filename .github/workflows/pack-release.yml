name: Pack games on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  pack-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create game zips
        run: |
          python zip-game.py --games 2DShooter adventure pong --copy-to zipped

      - name: Show created zips
        run: ls -la zipped || true

      - name: Upload release assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: zipped/*.zip
